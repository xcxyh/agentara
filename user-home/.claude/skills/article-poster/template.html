<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@600;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-start: #f5ede3;
        --bg-end: #ede4d8;
        --card-bg: #fffbf5;
        --card-border: #e8ddd0;
        --card-shadow: rgba(120, 90, 50, 0.06);
        --text-primary: #2c2418;
        --text-secondary: #5c4f3e;
        --text-dim: #8c7e6a;
        --highlight-bg: #faf6f0;
        --callout-bg: #fff8f0;
        --divider: #e0d5c6;
        --footer-bg: #f0e8dc;

        /* Section colors */
        --brown: #8b6542;
        --olive: #6b7c4e;
        --terracotta: #b87345;
        --teal: #4e8b7c;
        --amber: #b8963c;
        --sage: #7c8b6b;
        --slate: #6b7b8b;
        --rose: #b86b7c;

        --brown-light: #f5ede3;
        --olive-light: #edf2e6;
        --terracotta-light: #fbf0e6;
        --teal-light: #e6f2ef;
        --amber-light: #fbf5e6;
        --sage-light: #eff2eb;
        --slate-light: #ebf0f2;
        --rose-light: #f8edf0;
      }

      body {
        font-family:
          "Noto Sans SC",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: linear-gradient(
          170deg,
          var(--bg-start) 0%,
          var(--bg-end) 100%
        );
        color: var(--text-primary);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      .poster {
        padding: 52px 56px 36px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* === HEADER === */
      .header {
        margin-bottom: 36px;
      }
      .header-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .header-source {
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 2.5px;
        color: var(--brown);
        text-transform: uppercase;
      }
      .header-category {
        font-size: 19px;
        font-weight: 500;
        letter-spacing: 2px;
        color: var(--text-dim);
        text-transform: uppercase;
      }
      .header-title {
        font-family: "Noto Serif SC", "Noto Sans SC", serif;
        font-size: 52px;
        font-weight: 700;
        line-height: 1.3;
        color: var(--text-primary);
        margin-bottom: 16px;
      }
      .header-subtitle {
        font-size: 19px;
        line-height: 1.75;
        color: var(--text-secondary);
      }
      .header-subtitle strong {
        font-weight: 700;
        color: var(--text-primary);
      }

      /* === GRID === */
      .grid {
        display: grid;
        gap: 24px;
        flex: 1;
      }
      .grid[data-layout="double"] {
        grid-template-columns: 1fr 1fr;
      }
      .grid[data-layout="single"] {
        grid-template-columns: 1fr;
      }
      .col {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      /* === SECTION === */
      .section {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 28px 28px 24px;
        box-shadow: 0 2px 12px var(--card-shadow);
      }
      .section-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 20px;
      }
      .section-number {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 19px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }
      .section-title {
        font-size: 26px;
        font-weight: 700;
        line-height: 1.3;
      }

      /* === CARD: text === */
      .card-text {
        background: var(--highlight-bg);
        border: 1px solid var(--divider);
        border-radius: 10px;
        padding: 18px 20px;
        margin-bottom: 14px;
      }
      .card-text:last-child {
        margin-bottom: 0;
      }
      .card-text-heading {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--text-primary);
      }
      .card-text-body {
        font-size: 18px;
        line-height: 1.75;
        color: var(--text-secondary);
      }
      .card-text-body strong {
        font-weight: 700;
        color: var(--text-primary);
      }

      /* === CARD: highlight === */
      .card-highlight {
        background: var(--highlight-bg);
        border: 1px solid var(--divider);
        border-left: 4px solid var(--brown);
        border-radius: 2px 10px 10px 2px;
        padding: 20px 22px;
        margin-bottom: 14px;
      }
      .card-highlight:last-child {
        margin-bottom: 0;
      }
      .card-highlight-heading {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 10px;
        color: var(--text-primary);
      }
      .card-highlight-body {
        font-size: 18px;
        line-height: 1.75;
        color: var(--text-secondary);
      }
      .card-highlight-body strong {
        font-weight: 700;
        color: var(--text-primary);
      }

      /* === CARD: tags === */
      .card-tags {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .tag-item {
        display: flex;
        align-items: flex-start;
        gap: 14px;
      }
      .tag-label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 5px 16px;
        border-radius: 8px;
        font-size: 17px;
        font-weight: 700;
        color: #fff;
        white-space: nowrap;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .tag-text {
        font-size: 18px;
        line-height: 1.7;
        color: var(--text-secondary);
      }
      .tag-text strong {
        font-weight: 700;
        color: var(--text-primary);
      }

      /* === CARD: compare === */
      .card-compare {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .compare-box {
        background: var(--highlight-bg);
        border: 1px solid var(--divider);
        border-radius: 10px;
        padding: 18px 18px 14px;
      }
      .compare-heading {
        font-size: 19px;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--text-primary);
      }
      .compare-body {
        font-size: 17px;
        line-height: 1.7;
        color: var(--text-secondary);
      }
      .compare-body strong {
        font-weight: 700;
        color: var(--text-primary);
      }

      /* === CARD: bullets === */
      .card-bullets {
        padding: 0;
      }
      .bullet-item {
        font-size: 18px;
        line-height: 1.75;
        color: var(--text-secondary);
        padding-left: 18px;
        position: relative;
        margin-bottom: 10px;
      }
      .bullet-item:last-child {
        margin-bottom: 0;
      }
      .bullet-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: 10px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-dim);
      }
      .bullet-item strong {
        font-weight: 700;
        color: var(--text-primary);
      }

      /* === CARD: callout === */
      .card-callout {
        background: var(--callout-bg);
        border: 1px solid #e8d5c0;
        border-radius: 10px;
        padding: 18px 20px;
        margin-top: 14px;
      }
      .callout-label {
        display: inline-block;
        padding: 3px 12px;
        border-radius: 6px;
        font-size: 17px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 10px;
      }
      .callout-body {
        font-size: 18px;
        line-height: 1.75;
        color: var(--text-secondary);
      }
      .callout-body strong {
        font-weight: 700;
        color: var(--text-primary);
      }

      /* === FOOTER === */
      .footer {
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid var(--divider);
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .footer-left {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
      }
      .footer-left img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .footer-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, #b8963c, #8b6542);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(139, 101, 66, 0.25);
      }
      .footer-avatar-inner {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, #d4b87a, #a67c52);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
      .footer-author {
        font-size: 19px;
        font-weight: 700;
        color: var(--text-primary);
      }
      .footer-subtitle {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1.5px;
        color: var(--text-dim);
        margin-top: 2px;
      }
      .footer-tags {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .footer-tag {
        padding: 6px 18px;
        border-radius: 20px;
        border: 1px solid var(--divider);
        background: var(--card-bg);
        font-size: 17px;
        font-weight: 500;
        color: var(--text-secondary);
      }
      .footer-tag.accent {
        background: var(--text-primary);
        color: var(--card-bg);
        border-color: var(--text-primary);
        font-weight: 700;
        letter-spacing: 1px;
        font-size: 19px;
      }
    </style>
  </head>
  <body>
    <div class="poster" id="poster"></div>

    <script>
      // DATA_INJECT_POINT — render.py replaces this line
      const DATA = __POSTER_DATA__;

      const colorMap = {
        brown: "#8B6542",
        olive: "#6B7C4E",
        terracotta: "#B87345",
        teal: "#4E8B7C",
        amber: "#B8963C",
        sage: "#7C8B6B",
        slate: "#6B7B8B",
        rose: "#B86B7C",
      };

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function renderMarkdown(text) {
        // Basic bold and code support
        return text
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(
            /`(.+?)`/g,
            '<code style="background:#EDE4D8;padding:1px 5px;border-radius:3px;font-size:13px;">$1</code>',
          );
      }

      function renderCard(card, sectionColor) {
        const color = colorMap[sectionColor] || colorMap.brown;
        switch (card.type) {
          case "text":
            return `<div class="card-text">
        <div class="card-text-heading">${renderMarkdown(card.heading)}</div>
        <div class="card-text-body">${renderMarkdown(card.body)}</div>
      </div>`;

          case "highlight":
            return `<div class="card-highlight" style="border-left-color:${color}">
        <div class="card-highlight-heading">${renderMarkdown(card.heading)}</div>
        <div class="card-highlight-body">${renderMarkdown(card.body)}</div>
      </div>`;

          case "tags":
            return `<div class="card-tags">${card.items
              .map(
                (item) =>
                  `<div class="tag-item">
          <span class="tag-label" style="background:${color}">${escapeHtml(item.tag)}</span>
          <span class="tag-text">${renderMarkdown(item.text)}</span>
        </div>`,
              )
              .join("")}</div>`;

          case "compare":
            return `<div class="card-compare">
        <div class="compare-box">
          <div class="compare-heading">${renderMarkdown(card.left.heading)}</div>
          <div class="compare-body">${renderMarkdown(card.left.body)}</div>
        </div>
        <div class="compare-box">
          <div class="compare-heading">${renderMarkdown(card.right.heading)}</div>
          <div class="compare-body">${renderMarkdown(card.right.body)}</div>
        </div>
      </div>`;

          case "bullets":
            return `<div class="card-bullets">${card.items
              .map(
                (item) =>
                  `<div class="bullet-item" style="--dot-color:${color}">${renderMarkdown(item)}</div>`,
              )
              .join("")}</div>`;

          case "callout":
            return `<div class="card-callout">
        <span class="callout-label" style="background:${color}">${escapeHtml(card.label)}</span>
        <div class="callout-body">${renderMarkdown(card.body)}</div>
      </div>`;

          default:
            return "";
        }
      }

      function render() {
        const d = DATA;
        const layout = d.layout || "single";

        const renderSection = (s) => {
          const color = colorMap[s.color] || colorMap.brown;
          return `<div class="section">
      <div class="section-header">
        <div class="section-number" style="background:${color}">${s.number}</div>
        <div class="section-title">${escapeHtml(s.title)}</div>
      </div>
      ${s.cards.map((c) => renderCard(c, s.color)).join("")}
    </div>`;
        };

        let gridContent;
        if (layout === "double") {
          const left = d.sections.filter((_, i) => i % 2 === 0);
          const right = d.sections.filter((_, i) => i % 2 === 1);
          gridContent = `
      <div class="col">${left.map(renderSection).join("")}</div>
      <div class="col">${right.map(renderSection).join("")}</div>
    `;
        } else {
          gridContent = `<div class="col">${d.sections.map(renderSection).join("")}</div>`;
        }

        document.getElementById("poster").innerHTML = `
    <div class="header">
      <div class="header-meta">
        <span class="header-source">${escapeHtml(d.source)}</span>
        <span class="header-category">${escapeHtml(d.category)}</span>
      </div>
      <h1 class="header-title">${renderMarkdown(d.title)}</h1>
      <p class="header-subtitle">${renderMarkdown(d.subtitle)}</p>
    </div>
    <div class="grid" data-layout="${layout}">${gridContent}</div>
    <div class="footer">
      <div class="footer-left">
        <img src="logo.png" alt="Agentara">
      </div>
      <div>
        <div class="footer-author">Made with Agentara</div>
        <div class="footer-subtitle">github.com/magiccube/agentara</div>
      </div>
    </div>
  `;
      }

      render();
    </script>
  </body>
</html>
